services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - app_network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    networks:
      - app_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
      - temp_data:/app/temp
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - TEMP_DIR=/app/temp
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
      - temp_data:/app/temp
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    # Remove ports mapping so it's not exposed to the host, only accessible within app_network
    volumes:
      - redis_data:/data
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app_network:
    driver: bridge

volumes:
  redis_data:
  uploads_data:
  outputs_data:
  temp_data:
